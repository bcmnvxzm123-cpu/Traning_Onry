<!DOCTYPE html>
<html lang="ja">
<head>
    <title>HP</title>
</head>


<body style="background-color: skyblue;">

    
    <div class="Back">
        <div><!--これはただのタイトル-->
            <h1 class="Text">
                計算ができるよ!
            </h1>
        </div>


            <from action="/calc" method="get">
                    <input type="number" name="a">
                        <select>
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="x">x</option>
                        </select>
                    <input type="number" name="b">
                <button type="submit">計算する</button>
            </from>

            <p>
                結果：[[${result}]]
            </p>


            
    </div>
</body>
</html>
